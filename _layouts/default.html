<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title | default: "Project Dashboard" }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v={{ site.time | date: '%s' }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <header class="site-header">
        <div class="container">
            <h1>{{ site.title }}</h1>
            <p class="site-description">{{ site.description }}</p>
        </div>
    </header>

    <main class="container">
        {{ content }}
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>Maintained by <a href="https://github.com/basheerkalanchera">BasheerKalanchera</a></p>
        </div>
    </footer>
    <script data-goatcounter="https://project-amanah.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>

</html>
